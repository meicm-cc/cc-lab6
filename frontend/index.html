<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Architecture - Persistency and Object Storage</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #eef2f3; max-width: 800px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { padding: 12px; margin-top: 10px; width: 100%; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc;}
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .user-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;}
        .user-card { text-align: center; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        .user-card img { max-width: 100%; border-radius: 50%; height: 100px; width: 100px; object-fit: cover; border: 3px solid #007bff; }
    </style>
</head>
<body>
    <h1>Cloud Computing - Lab Worksheet 5</h1>
    
    <div class="card">
        <h2>Register User Profile</h2>
        <input type="text" id="username" placeholder="Enter your Username" required>
        <input type="file" id="profilePic" accept="image/jpeg" required>
        <button onclick="registerUser()">Upload & Register</button>
        <p id="status" style="font-weight: bold; margin-top: 15px;"></p>
    </div>

    <div class="card">
        <h2>Registered Users</h2>
        <div class="user-list" id="usersList">Waiting for data...</div>
    </div>

    <script>
        const API_URL = 'http://api.meicm.pt';
        const S3_PUBLIC_URL = 'http://s3.meicm.pt/profile-pictures';

        async function loadUsers() {
            try {
                const res = await fetch(API_URL + '/users');
                const users = await res.json();
                const list = document.getElementById('usersList');
                list.innerHTML = '';
                
                users.forEach(user => {
                    list.innerHTML += `
                        <div class="user-card">
                            <img src="${S3_PUBLIC_URL}/${user.picture_filename}" alt="Profile" onerror="this.src='https://via.placeholder.com/100'">
                            <h3>${user.username}</h3>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById('usersList').innerText = 'Error loading users from database.';
            }
        }

        async function registerUser() {
            const status = document.getElementById('status');
            const username = document.getElementById('username').value;
            const fileInput = document.getElementById('profilePic');
            
            if (!username || !fileInput.files[0]) {
                status.innerText = "Please provide both a username and an image.";
                status.style.color = "red";
                return;
            }

            const file = fileInput.files[0];
            status.innerText = "Step 1. Requesting AWS S3 Presigned URL from API...";
            status.style.color = "blue";

            try {
                const urlRes = await fetch(API_URL + '/upload-url');
                const { uploadUrl, filename } = await urlRes.json();

                status.innerText = "Step 2. Uploading Image Directly to MinIO...";
                
                await fetch(uploadUrl, {
                    method: 'PUT',
                    body: file,
                    headers: { 'Content-Type': 'image/jpeg' }
                });

                status.innerText = "Step 3. Saving user record to PostgreSQL...";

                await fetch(API_URL + '/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, picture_filename: filename })
                });

                status.innerText = "Success! Your solution is fully operational :)";
                status.style.color = "green";
                
                document.getElementById('username').value = '';
                fileInput.value = '';
                loadUsers();

            } catch (err) {
                console.error(err);
                status.innerText = "Error: " + err.message;
                status.style.color = "red";
            }
        }

        loadUsers();
    </script>
</body>
</html>
